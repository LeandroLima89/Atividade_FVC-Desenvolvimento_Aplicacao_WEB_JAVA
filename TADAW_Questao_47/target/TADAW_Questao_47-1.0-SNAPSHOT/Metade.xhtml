<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title>Metade dos Números</title>
</h:head>
<h:body>
    <h:form>
        <h2>Digite 10 números:</h2>
        <ui:repeat value="#{metadeBean.numeros}" var="num" varStatus="status">
            <h:outputLabel value="Número #{status.index + 1}:" />
            <h:inputText value="#{metadeBean.numeros[status.index]}" style="margin-bottom: 15px;"/>
            <br/>
        </ui:repeat>

        <h:commandButton value="Calcular Metades" action="#{metadeBean.processar}" style="margin-bottom: 10px;"/>
    </h:form>

    <h:panelGroup rendered="#{not empty metadeBean.resultados}">
        <h3>Metade de cada número:</h3>
        <h:outputText value="#{metadeBean.resultados}" />
    </h:panelGroup>
</h:body>
</html>
