<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title>Série de Ricci</title>
</h:head>
<h:body>
    <h:form>
        <h2>Gerar Série de Ricci</h2>

        <h:outputLabel value="Primeiro número: " />
        <h:inputText value="#{ricciBean.primeiro}" /><br/><br/>

        <h:outputLabel value="Segundo número: " />
        <h:inputText value="#{ricciBean.segundo}" /><br/><br/>

        <h:commandButton value="Gerar Série" action="#{ricciBean.gerarRicci}" />
    </h:form>

    <h:panelGroup rendered="#{not empty ricciBean.serie}">
        <h3>Os 10 primeiros termos:</h3>
        <ui:repeat value="#{ricciBean.serie}" var="num">
            <h:outputText value="#{num}" /> <br/>
        </ui:repeat>
    </h:panelGroup>
</h:body>
</html>
