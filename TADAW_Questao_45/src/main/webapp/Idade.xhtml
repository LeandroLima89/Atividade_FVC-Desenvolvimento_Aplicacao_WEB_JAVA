<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <head>
        <title>Idades</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    </head>
    <body>
        <h:form>
            <h2>Informe a idade de 20 pessoas</h2>
            <h:panelGrid columns="2" cellpadding="5" style="margin-bottom: 15px; vertical-align: top;">
                <ui:repeat value="#{idadeBean.idades}" var="idade" varStatus="status">
                    <h:outputText value="Pessoa #{status.index + 1}:" />
                    <h:inputText value="#{idadeBean.idades[status.index]}" style="width: 80px; display: block;" />
                </ui:repeat>
            </h:panelGrid>    

            <h:commandButton value="Calcular" action="#{idadeBean.calcular}"/>
        </h:form>

        <h:panelGroup rendered="#{idadeBean.resultadoDisp}">
            <h3>Resultado</h3>  
            <h:outputText value="Menor idade: #{idadeBean.menor}" /><br/>
            <h:outputText value="Quantidade de pessoas com menor idade: #{idadeBean.qtdMenor}" />
        </h:panelGroup>

    </body>
</html>
