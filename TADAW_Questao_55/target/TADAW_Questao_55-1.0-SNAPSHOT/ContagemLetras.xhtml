<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title>Contar Letras A</title>
</h:head>
<h:body>
    <h:form>
        <h:inputText value="#{msg}" style="margin-right: 10px;"/>
        <h:commandButton value="Adicionar" action="#{contagemLetras.adicionarMensagem(msg)}" style="margin-right: 10px;" />
        <h:commandButton value="Contar Letras A" action="#{contagemLetras.contarAs}"/>
    </h:form>

    <h:panelGroup rendered="#{contagemLetras.totalAs ne 0}">
        <h3>Palavras digitadas:</h3>
        <ui:repeat value="#{contagemLetras.mensagens}" var="m">
            <h:outputText value="#{m}" /><br/>
        </ui:repeat>

        <h3>Total de letras A encontradas:</h3>
        <h:outputText value="#{contagemLetras.totalAs}" />
    </h:panelGroup>
</h:body>
</html>
