<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html">
    <h:head>
        <title>Exponenciação</title>
    </h:head>
    <h:body>
        <h:form>
            <h2>Calcular Bⁿ</h2>

            <h:outputLabel value="Digite o valor de B (≥ 2): " />
            <h:inputText value="#{exponenteBean.base}" /><br/><br/>

            <h:outputLabel value="Digite o valor de n (> 1): " />
            <h:inputText value="#{exponenteBean.expoente}" /><br/><br/>

            <h:commandButton value="Calcular" action="#{exponenteBean.calcular}" />
        </h:form>

        <h:panelGroup rendered="#{not empty exponenteBean.resultado}">
            <h3>Resultado:</h3>
            <h:outputText value="#{exponenteBean.resultado}" />
        </h:panelGroup>
    </h:body>
</html>
